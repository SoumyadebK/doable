  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  .demo-page { text-align: center; color: #64748b; font-size: 13px; padding: 20px; }
  .demo-page h2 { font-family: 'Sora', sans-serif; font-size: 24px; color: #1e293b; margin-bottom: 6px; }

    /* Calendar */
  .cal-day{text-align:center;padding:6px 2px;border-radius:6px;font-size:13px;}
  .cal-past{color:#cbd5e1;cursor:not-allowed;}
  .cal-avail{color:#1e293b;cursor:pointer;}
  .cal-avail:hover{background:var(--brand,#c8102e);color:#fff;}
</style>
</head>
<body>

<div id="doable-window" style="display:flex;flex-direction:column;height:100vh;background:#fff;border-radius:0;box-shadow:none;transform:none;opacity:1;pointer-events:all;">
  <div class="chat-header">
    <div class="chat-avatar" id="chat-avatar">💬</div>
    <div class="chat-header-info">
      <div class="chat-header-name" id="chat-title">DOable Concierge</div>
    </div>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="input-row" id="input-row" style="display:none">
    <input class="chat-input" id="chat-input" type="text" placeholder="Type here…" onkeydown="handleKey(event)">
    <button class="send-btn" onclick="handleTextSend()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
// ── API Config (read from URL params) ────────────────
const _params     = new URLSearchParams(window.location.search);
const ACCOUNT_ID  = _params.get('account')  || '';
const LOCATION_ID = _params.get('location') || '';
const API_BASE    = 'https://doable.net/chatbot/api';

    per_session_label:"por sesión",
  }

// ── Period config (code → label key + time range matcher) ─────────────────
const PERIOD_MAP = {
  M: { key: 'morning',   match: h => h >= 5  && h < 12 },
  A: { key: 'afternoon', match: h => h >= 12 && h < 17 },
  E: { key: 'evening',   match: h => h >= 17 && h < 21 },
  N: { key: 'night',     match: h => h >= 21 || h < 5  },
};

// ── API Calls ─────────────────────────────────────────
async function fetchLocationConfig() {
  const res  = await fetch(`${API_BASE}/get_location_config.php?account=${ACCOUNT_ID}&location=${LOCATION_ID}`);
  const json = await res.json();
  if (json.status === 'success') return json.data;
  throw new Error('Could not load location config');
}
async function fetchOfferings() {
  const res  = await fetch(`${API_BASE}/get_offerings.php?account=${ACCOUNT_ID}`);
  const json = await res.json();
  if (json.status === 'success') return json.data;
  return [];
}
async function fetchPricing() {
  // Location is always known — use it directly
  const res  = await fetch(`${API_BASE}/get_pricing.php?account=${ACCOUNT_ID}&location=${LOCATION_ID}`);
  const json = await res.json();
  if (json.status === 'success') return json.data;
  return [];
}
async function fetchSlots(date) {
  const res  = await fetch(`${API_BASE}/get_available_slots.php?account=${ACCOUNT_ID}&location=${LOCATION_ID}&date=${date}`);
  const json = await res.json();
  if (json.status === 'success') {
    return json.data.map(s => s.slot_start_time).sort(); // HH:MM:SS strings sort correctly
  }
  return [];
}
async function postBooking(payload) {
  const res = await fetch(`${API_BASE}/book_appointment.php`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  return await res.json();
}

// ── State ─────────────────────────────────────────────
const state = {
  step: 'idle', lang: 'en',
  period: null, periodMatchFn: null,
  selectedDate: null, selectedSlot: null,
  name: null, phone: null, email: null,
};
let LOCATION_CONFIG = null; // full config object
let LOCATION        = null; // shorthand: LOCATION_CONFIG.locations[0]
let OFFERINGS       = [];

// ── Helpers ───────────────────────────────────────────
const $ = id => document.getElementById(id);
const msgs = () => $('chat-messages');
const t = key => T[state.lang][key] || T['en'][key] || key;

function capitalizeName(str) { return str.replace(/\b\w/g, c => c.toUpperCase()); }
function now() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
function scrollBottom() { const el = msgs(); setTimeout(() => { el.scrollTop = el.scrollHeight; }, 60); }

function addBotBubble(html, delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const wrap = document.createElement('div');
      wrap.className = 'msg bot';
      wrap.innerHTML = `<div class="bubble">${html}</div><div class="msg-time">${now()}</div>`;
      msgs().appendChild(wrap);
      scrollBottom();
      resolve(wrap);
    }, delay);
  });
}
function addUserBubble(text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg user';
  wrap.innerHTML = `<div class="bubble">${text}</div><div class="msg-time">${now()}</div>`;
  msgs().appendChild(wrap);
  scrollBottom();
}
function addElement(el) { msgs().appendChild(el); scrollBottom(); }
function addButtons(buttons) {
  const group = document.createElement('div');
  group.className = 'btn-group';
  group.id = 'active-btn-group';
  buttons.forEach(btn => {
    const b = document.createElement('button');
    b.className = 'choice-btn' + (btn.secondary ? ' secondary' : '');
    b.textContent = btn.label;
    b.onclick = () => { disableButtons(); btn.action(); };
    group.appendChild(b);
  });
  addElement(group);
}
function disableButtons() {
  const g = $('active-btn-group');
  if (g) g.querySelectorAll('button').forEach(b => b.disabled = true);
}
function showTyping() {
  const el = document.createElement('div');
  el.className = 'typing-bubble'; el.id = 'typing';
  el.innerHTML = '<span></span><span></span><span></span>';
  addElement(el);
}
function removeTyping() { const el = $('typing'); if (el) el.remove(); }
function showInput(placeholder) {
  $('input-row').style.display = 'flex';
  $('chat-input').placeholder = placeholder;
  $('chat-input').value = '';
  setTimeout(() => { $('chat-input').focus(); scrollBottom(); }, 120);
}
function hideInput() { $('input-row').style.display = 'none'; $('chat-input').value = ''; }
function formatTime(s) {
  const [h, m] = s.split(':');
  const hr = parseInt(h), ampm = hr >= 12 ? 'PM' : 'AM';
  return `${hr % 12 || 12}:${m} ${ampm}`;
}
function formatDateLong(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString(state.lang === 'es' ? 'es-ES' : 'en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

// ── Flow Start ────────────────────────────────────────
async function startFlow() {
  showTyping();
  try {
    LOCATION_CONFIG = await fetchLocationConfig();
    OFFERINGS       = await fetchOfferings();
  } catch(e) {
    removeTyping();
    addBotBubble("Sorry, I'm having trouble loading. Please try again shortly.");
    return;
  }
  removeTyping();

  // Pre-set the single location into state — no location selection step needed
  LOCATION       = LOCATION_CONFIG.locations[0];
  state.location = LOCATION;

  // Apply branding immediately — title doesn't need language selection to be set
  const color = LOCATION_CONFIG.primary_color || '#c8102e';
  const emoji = LOCATION_CONFIG.avatar_emoji  || '💬';
  document.documentElement.style.setProperty('--brand', color);
  $('chat-avatar').textContent = emoji;
  $('chat-title').textContent  = `${LOCATION_CONFIG.business_name} Concierge`;

  const langs = LOCATION_CONFIG.languages || ['en'];
  if (langs.length > 1) {
    await addBotBubble(T['en']['select_lang'] + '<br>' + T['es']['select_lang'], 400);
    setTimeout(() => showLangSelector(langs), 800);
  } else {
    state.lang = langs[0] || 'en';
    applyBranding();
    showMenu();
  }
}

function showLangSelector(langs) {
  const group = document.createElement('div');
  group.className = 'lang-selector';
  const langMap = { en: { label: '🇺🇸 English', val: 'en' }, es: { label: '🇪🇸 Español', val: 'es' } };
  langs.forEach(l => {
    if (!langMap[l]) return;
    const b = document.createElement('button');
    b.className = 'lang-btn';
    b.textContent = langMap[l].label;
    b.onclick = () => {
      group.querySelectorAll('button').forEach(x => x.disabled = true);
      addUserBubble(langMap[l].label);
      state.lang = l;
      applyBranding();
      showMenu();
    };
    group.appendChild(b);
  });
  addElement(group);
}

function applyBranding() {
  $('chat-title').textContent = `${LOCATION_CONFIG.business_name} Concierge`;
}

async function showMenu() {
  state.step = 'menu';
  const emojiMap = { pricing: '💰', booking: '📅', contact: '📞', faq: '❓' };
  await addBotBubble(LOCATION_CONFIG.welcome_message, 400);
  await addBotBubble(t('welcome_option'), 900);
  setTimeout(() => {
    addButtons(LOCATION_CONFIG.menu_options.map(opt => {
      const emoji = opt.is_offerings ? '💃' : (emojiMap[opt.type] || '');
      return { label: `${emoji} ${opt.label}`, action: () => handleMenu(opt.type) };
    }));
  }, 1300);
}

// ── Menu Handlers ─────────────────────────────────────
async function handleMenu(type) {
  const offeringsMenuItem = LOCATION_CONFIG.menu_options.find(o => o.is_offerings);
  const isOfferings = offeringsMenuItem && offeringsMenuItem.type === type;

  if (isOfferings) {
    addUserBubble('💃 ' + (offeringsMenuItem.label || 'Offerings'));
    await addBotBubble(t('dances_prompt'), 500);
    setTimeout(() => {
      const btns = OFFERINGS.map(o => ({ label: o.name, action: () => showOfferingDetail(o) }));
      btns.push({ label: t('start_over'), action: () => { resetState(); backToMenu(); }, secondary: true });
      addButtons(btns);
    }, 900);

  } else if (type === 'pricing') {
    addUserBubble('💰 ' + (LOCATION_CONFIG.menu_options.find(o => o.type === 'pricing')?.label || 'Pricing'));
    showTyping();
    const packages = await fetchPricing(); // returns flat array of packages
    removeTyping();

    if (!packages || packages.length === 0) {
      await addBotBubble(t('pricing_title'), 400);
      await addBotBubble('No pricing information is available at this time.', 600);
      setTimeout(() => {
        addButtons([
          { label: t('more_info'),  action: () => backToMenu() },
          { label: t('start_over'), action: () => { resetState(); backToMenu(); }, secondary: true },
        ]);
      }, 400);
    } else {
      await addBotBubble(t('packages_prompt'), 400);
      setTimeout(() => showPackageList(packages), 700);
    }

  } else if (type === 'booking') {
    addUserBubble('📅 ' + (LOCATION_CONFIG.menu_options.find(o => o.type === 'booking')?.label || 'Book Appointment'));
    startBooking();

  } else if (type === 'contact') {
    addUserBubble('📞 ' + (LOCATION_CONFIG.menu_options.find(o => o.type === 'contact')?.label || 'Contact Us'));
    showTyping();
    await new Promise(r => setTimeout(r, 600));
    removeTyping();
    const card = document.createElement('div');
    card.className = 'contact-card';
    card.innerHTML = `<div class="card-title">${t('contact_title')}</div>
      <strong>${LOCATION.name}</strong><br>${LOCATION.phone}`;
    addElement(card);
    setTimeout(() => {
      addButtons([
        { label: t('more_info'),  action: () => backToMenu() },
        { label: t('start_over'), action: () => { resetState(); backToMenu(); }, secondary: true },
      ]);
    }, 400);

  } else if (type === 'faq') {
    addUserBubble('❓ ' + (LOCATION_CONFIG.menu_options.find(o => o.type === 'faq')?.label || 'FAQ'));
    const faqs = LOCATION_CONFIG.faq || [];
    if (faqs.length === 0) {
      await addBotBubble(t('faq_title'), 400);
      await addBotBubble('No FAQs available at this time.', 600);
      setTimeout(() => {
        addButtons([
          { label: t('more_info'),  action: () => backToMenu() },
          { label: t('start_over'), action: () => { resetState(); backToMenu(); }, secondary: true },
        ]);
      }, 400);
    } else {
      await addBotBubble(t('faq_prompt'), 500);
      setTimeout(() => showFaqList(faqs), 800);
    }
  }
}

async function showOfferingDetail(offering) {
  addUserBubble(offering.name);
  const card = document.createElement('div');
  card.className = 'info-card';
  card.innerHTML = `<div class="card-title">💃 ${offering.name}</div>${offering.description}`;
  await new Promise(r => setTimeout(r, 400));
  addElement(card);
  setTimeout(() => {
    addButtons([
      { label: t('back_to_offerings'), action: () => { addUserBubble(t('back')); handleMenu(LOCATION_CONFIG.menu_options.find(o => o.is_offerings)?.type); } },
      { label: t('book_now'),          action: () => startBooking() },
      { label: t('more_info'),         action: () => backToMenu() },
      { label: t('start_over'),        action: () => { resetState(); backToMenu(); }, secondary: true },
    ]);
  }, 400);
}

// ── Package / Pricing Flow ────────────────────────────
function showPackageList(packages) {
  const btns = packages.map(pkg => ({
    label:  `📦 ${pkg.name} — ${pkg.price}`,
    action: () => showPackageDetail(pkg, packages)
  }));
  btns.push({ label: t('book_now'),   action: () => startBooking() });
  btns.push({ label: t('start_over'), action: () => { resetState(); backToMenu(); }, secondary: true });
  addButtons(btns);
}

async function showPackageDetail(pkg, packages) {
  addUserBubble(`📦 ${pkg.name}`);
  showTyping();
  await new Promise(r => setTimeout(r, 500));
  removeTyping();

  const card = document.createElement('div');
  card.className = 'info-card';
  const servicesHtml = (pkg.services || []).map(s =>
    `<div style="margin-bottom:8px;">
      <strong>${s.name}</strong>
      ${s.description ? `<br><span style="font-size:12px;color:#64748b">${s.description}</span>` : ''}
    </div>`
  ).join('');
  card.innerHTML = `<div class="card-title">📦 ${pkg.name}</div>
    ${pkg.description ? `<div style="margin-bottom:8px;color:#64748b;font-size:12px">${pkg.description}</div>` : ''}
    <div style="margin-bottom:10px">
      <strong>${pkg.label}</strong> — <strong>${pkg.price}</strong>
      ${pkg.note ? `<br><span style="font-size:12px;color:#64748b">${pkg.note}</span>` : ''}
    </div>
    ${servicesHtml}`;
  addElement(card);

  setTimeout(() => {
    addButtons([
      { label: t('back_to_packages'), action: () => { addUserBubble(t('back')); addBotBubble(t('packages_prompt'), 300).then(() => setTimeout(() => showPackageList(packages), 600)); } },
      { label: t('book_now'),         action: () => startBooking() },
      { label: t('more_info'),        action: () => backToMenu() },
      { label: t('start_over'),       action: () => { resetState(); backToMenu(); }, secondary: true },
    ]);
  }, 400);
}

// ── FAQ Flow ──────────────────────────────────────────
function showFaqList(faqs) {
  const btns = faqs.map((faq, i) => ({
    label:  faq.question,
    action: () => showFaqAnswer(faq, faqs)
  }));
  btns.push({ label: t('start_over'), action: () => { resetState(); backToMenu(); }, secondary: true });
  addButtons(btns);
}

async function showFaqAnswer(faq, faqs) {
  addUserBubble(faq.question);
  showTyping();
  await new Promise(r => setTimeout(r, 500));
  removeTyping();
  const card = document.createElement('div');
  card.className = 'info-card';
  card.innerHTML = `<div class="card-title">❓ ${faq.question}</div>${faq.answer}`;
  addElement(card);
  setTimeout(() => {
    addButtons([
      { label: t('back_to_faq'), action: () => { addUserBubble(t('back')); addBotBubble(t('faq_prompt'), 300).then(() => setTimeout(() => showFaqList(faqs), 600)); } },
      { label: t('book_now'),    action: () => startBooking() },
      { label: t('more_info'),   action: () => backToMenu() },
      { label: t('start_over'),  action: () => { resetState(); backToMenu(); }, secondary: true },
    ]);
  }, 400);
}

// ── Booking Flow ──────────────────────────────────────
// Location is already known — go straight to period selection
async function startBooking() {
  state.step = 'select_period';
  const periods = LOCATION.booking_periods; // e.g. ['A','E']

  if (!periods || periods.length === 0) {
    // Fallback: jump straight to date with no period filter
    await addBotBubble(t('which_day'), 400);
    state.period = null;
    state.periodMatchFn = () => true;
    setTimeout(() => showDateButtons(() => true), 800);
    return;
  }

  if (periods.length === 1) {
    // Only one period available — skip the question, go straight to dates
    handlePeriodSelected(periods[0]);
    return;
  }

  // Multiple periods — let user choose
  await addBotBubble(t('select_period'), 400);
  setTimeout(() => {
    const btns = periods.map(code => ({
      label: t(PERIOD_MAP[code].key),
      action: () => handlePeriodSelected(code)
    }));
    btns.push({ label: t('start_over'), action: () => { resetState(); backToMenu(); }, secondary: true });
    addButtons(btns);
  }, 800);
}

async function handlePeriodSelected(periodCode) {
  const periodDef = PERIOD_MAP[periodCode];
  addUserBubble(t(periodDef.key));
  state.period        = periodCode;
  state.periodMatchFn = slot => periodDef.match(parseInt(slot.split(':')[0]));
  state.step = 'select_date';
  await showDateButtons(state.periodMatchFn);
}

async function showDateButtons(matchFn) {
  const dayNames   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const matchingDays = [];

  showTyping();
  for (let i = 0; i < 14 && matchingDays.length < 2; i++) {
    const d = new Date(); d.setDate(d.getDate() + i);
    const iso    = d.toISOString().split('T')[0];
    const allSlots = await fetchSlots(iso);
    const slots  = allSlots.filter(matchFn);
    if (slots.length > 0) {
      matchingDays.push({ iso, dayName: dayNames[d.getDay()], dayNum: d.getDate(), month: monthNames[d.getMonth()], slots });
    }
  }
  removeTyping();

  if (matchingDays.length === 0) {
    const periodLabel = state.period ? t(PERIOD_MAP[state.period].key) : '';
    await addBotBubble(`${t('no_slots')} ${periodLabel} ${t('no_slots2')}`);
    setTimeout(() => {
      const altPeriods = (LOCATION.booking_periods || []).filter(c => c !== state.period);
      const btns = altPeriods.map(code => ({
        label: `${t('try_other')} ${t(PERIOD_MAP[code].key)}`,
        action: () => handlePeriodSelected(code)
      }));
      btns.push({ label: t('start_over'), action: () => { resetState(); backToMenu(); }, secondary: true });
      addButtons(btns);
    }, 400);
    return;
  }

  await addBotBubble(t('which_day'));
  setTimeout(() => {
    const buttons = matchingDays.map(day => ({
      label:  `${day.dayName} ${day.dayNum} ${day.month}`,
      action: () => handleDateSelected(day, day.slots)
    }));
    buttons.push({ label: t('pick_date'), action: () => showMiniCalendar(matchFn) });
    buttons.push({ label: t('start_over'), action: () => { resetState(); backToMenu(); }, secondary: true });
    addButtons(buttons);
  }, 400);
}

async function handleDateSelected(day, slotList) {
  addUserBubble(`${day.dayName} ${day.dayNum} ${day.month}`);
  state.selectedDate = day.iso;
  state.step = 'select_slot';
  showTyping();
  if (!slotList || slotList.length === 0) {
    slotList = await fetchSlots(day.iso);
  }
  removeTyping();
  await addBotBubble(`${t('available_times')} <strong>${formatDateLong(day.iso)}</strong> ${t('at')} <strong>${LOCATION.name}</strong>:`);
  setTimeout(() => {
    const timeButtons = slotList.map(s => ({
      label:  formatTime(s),
      action: () => handleSlotSelected(formatTime(s))
    }));
    addButtons(timeButtons);
    setTimeout(() => {
      const backBtn = document.createElement('div');
      backBtn.className = 'btn-group';
      const b1 = document.createElement('button');
      b1.className = 'choice-btn secondary';
      b1.textContent = t('choose_another');
      b1.onclick = () => { b1.disabled = true; showDateButtons(state.periodMatchFn || (() => true)); };
      const b2 = document.createElement('button');
      b2.className = 'choice-btn secondary';
      b2.textContent = t('start_over');
      b2.onclick = () => { b2.disabled = true; resetState(); backToMenu(); };
      backBtn.appendChild(b1);
      backBtn.appendChild(b2);
      addElement(backBtn);
    }, 200);
  }, 400);
}

async function handleSlotSelected(label) {
  addUserBubble(label);
  state.selectedSlot = label;
  state.step = 'ask_name';
  await addBotBubble(t('booking_intro'), 400);
  setTimeout(() => {
    addBotBubble(t('ask_name'), 800).then(() => showInput('e.g. Jane Smith'));
  }, 400);
}

function handleTextSend() {
  const val = $('chat-input').value.trim();
  if (!val) return;
  $('chat-input').value = '';

  if (state.step === 'ask_name') {
    state.name = capitalizeName(val);
    addUserBubble(state.name);
    state.step = 'ask_phone';
    hideInput();
    addBotBubble(`${t('ask_phone')} <strong>${state.name}?</strong>`, 400)
      .then(() => showInput('e.g. 310-555-1234'));

  } else if (state.step === 'ask_phone') {
    state.phone = val;
    addUserBubble(val);
    state.step = 'ask_email';
    hideInput();
    addBotBubble(t('ask_email'), 400)
      .then(() => showInput('e.g. jane@email.com'));

  } else if (state.step === 'ask_email') {
    state.email = val;
    addUserBubble(val);
    state.step = 'confirm';
    hideInput();
    showConfirmation();
  }
}
function handleKey(e) { if (e.key === 'Enter') handleTextSend(); }

async function showConfirmation() {
  await addBotBubble(t('summary_title'), 500);
  const card = document.createElement('div');
  card.className = 'confirm-card';
  card.innerHTML = `
    ${t('label_location')}: <strong>${LOCATION.name}</strong><br>
    ${t('label_date')}: <strong>${formatDateLong(state.selectedDate)}</strong><br>
    ${t('label_time')}: <strong>${state.selectedSlot}</strong><br>
    ${t('label_name')}: <strong>${state.name}</strong><br>
    ${t('label_phone')}: <strong>${state.phone}</strong><br>
    ${t('label_email')}: <strong>${state.email}</strong>
  `;
  setTimeout(() => {
    addElement(card);
    setTimeout(() => {
      addButtons([
        { label: t('confirm_booking'), action: confirmBooking },
        { label: t('start_over'),      action: () => { resetState(); backToMenu(); }, secondary: true },
      ]);
    }, 400);
  }, 800);
}

async function confirmBooking() {
  state.step = 'booking';
  showTyping();
  const result = await postBooking({
    account:  ACCOUNT_ID,
    location: LOCATION_ID,
    date:     state.selectedDate,
    slot:     state.selectedSlot,
    name:     state.name,
    phone:    state.phone,
    email:    state.email,
  });
  removeTyping();

  if (result.status !== 'success') {
    addBotBubble(`${t('error_booking')} ${result.message || ''}`);
    setTimeout(() => {
      addButtons([{ label: t('try_again'), action: () => confirmBooking() }]);
    }, 400);
    return;
  }

  const success = document.createElement('div');
  success.className = 'success-msg';
  success.innerHTML = `✅ <strong>${t('booked_title')} ${state.name}!</strong><br>
    ${t('booked_msg')} ${formatDateLong(state.selectedDate)} ${t('at')} ${state.selectedSlot}<br>
    📍 ${LOCATION.name}<br>
    ${result.booking_id ? `<span style="font-size:11px;color:#166534;opacity:0.8">Booking ref: ${result.booking_id}</span>` : ''}`;
  addElement(success);

  setTimeout(() => {
    addBotBubble(`${t('anything_else')} <strong>${state.name}?</strong> 😊`, 1000).then(() => {
      setTimeout(() => {
        addButtons([
          { label: t('book_another'), action: () => { resetState(); startBooking(); } },
          { label: t('more_info'),    action: () => { resetState(); backToMenu(); } },
          { label: t('im_done'),      action: () => handleDone() },
        ]);
      }, 400);
    });
  }, 800);
  state.step = 'done';
}

async function handleDone() {
  await addBotBubble(`${t('goodbye')} <strong>${state.name}!</strong> ${t('goodbye2')}`, 400);
}

function resetState() {
  state.step = 'menu'; state.period = null; state.periodMatchFn = null;
  state.selectedDate = null; state.selectedSlot = null;
  state.name = null; state.phone = null; state.email = null;
  // Note: state.location is NOT reset — it stays as LOCATION throughout
  hideInput();
}

async function backToMenu() {
  resetState();
  await addBotBubble(t('welcome_option'), 300);
  setTimeout(() => {
    const emojiMap = { pricing: '💰', booking: '📅', contact: '📞', faq: '❓' };
    addButtons(LOCATION_CONFIG.menu_options.map(opt => {
      const emoji = opt.is_offerings ? '💃' : (emojiMap[opt.type] || '');
      return { label: `${emoji} ${opt.label}`, action: () => handleMenu(opt.type) };
    }));
  }, 700);
}

// ── Mini Calendar ─────────────────────────────────────
function showMiniCalendar(matchFn) {
  const existing = document.getElementById('mini-cal');
  if (existing) existing.remove();
  const today = new Date();
  let calYear = today.getFullYear(), calMonth = today.getMonth();
  const chatWin = $('doable-window');
  const overlay = document.createElement('div');
  overlay.id = 'mini-cal';
  overlay.style.cssText = 'position:absolute;inset:0;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;z-index:99999;border-radius:20px;';

  function renderCal() {
    const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const dayLabels  = ['Su','Mo','Tu','We','Th','Fr','Sa'];
    const firstDay   = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    let daysHtml = '';
    for (let i = 0; i < firstDay; i++) daysHtml += '<div></div>';
    for (let d = 1; d <= daysInMonth; d++) {
      const iso    = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isPast = new Date(iso + 'T00:00:00') < new Date(today.toISOString().split('T')[0] + 'T00:00:00');
      daysHtml += `<div class="cal-day ${isPast ? 'cal-past' : 'cal-avail'}" data-iso="${iso}">${d}</div>`;
    }
    overlay.innerHTML = `
      <div style="background:#fff;border-radius:16px;padding:18px;width:290px;box-shadow:0 8px 32px rgba(0,0,0,0.18);">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <button id="cal-prev" style="background:none;border:none;font-size:20px;cursor:pointer;color:#1e293b;padding:0 6px;">&#8249;</button>
          <span style="font-family:'Sora',sans-serif;font-weight:700;font-size:14px;color:#1e293b;">${monthNames[calMonth]} ${calYear}</span>
          <button id="cal-next" style="background:none;border:none;font-size:20px;cursor:pointer;color:#1e293b;padding:0 6px;">&#8250;</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px;">
          ${dayLabels.map(d => `<div style="text-align:center;font-size:10px;font-weight:600;color:#94a3b8;">${d}</div>`).join('')}
        </div>
        <div id="cal-days" style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;">${daysHtml}</div>
        <button id="cal-cancel" style="margin-top:14px;width:100%;padding:8px;border:1.5px solid #e2e8f0;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;color:#64748b;font-family:'Inter',sans-serif;">${t('back')}</button>
      </div>`;

    overlay.querySelector('#cal-prev').onclick   = e => { e.stopPropagation(); calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCal(); };
    overlay.querySelector('#cal-next').onclick   = e => { e.stopPropagation(); calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCal(); };
    overlay.querySelector('#cal-cancel').onclick = () => overlay.remove();
    overlay.onclick = e => { if(e.target === overlay) overlay.remove(); };
    overlay.querySelectorAll('.cal-avail').forEach(el => {
      el.onclick = async e => {
        e.stopPropagation();
        const iso = el.dataset.iso;
        overlay.remove();
        const d  = new Date(iso + 'T00:00:00');
        const dn = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        const mn = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const chosenDay = { iso, dayName: dn[d.getDay()], dayNum: d.getDate(), month: mn[d.getMonth()] };
        const allSlots  = await fetchSlots(iso);
        const filtered  = allSlots.filter(matchFn);
        const slotList  = filtered.length > 0 ? filtered : (allSlots.length > 0 ? allSlots : []);
        handleDateSelected(chosenDay, slotList);
      };
    });
  }
  renderCal();
  chatWin.style.position = 'relative';
  chatWin.appendChild(overlay);
}

// ── iframe mode — start immediately, notify parent of height changes ─────────
function notifyHeight() {
  const h = document.body.scrollHeight;
  window.parent.postMessage({ type: 'doable-resize', height: h }, '*');
}

// Observe content changes and report height to parent loader
const _resizeObserver = new ResizeObserver(() => notifyHeight());
_resizeObserver.observe(document.getElementById('chat-messages'));

// Start flow immediately — no launcher needed in iframe mode
window.addEventListener('load', () => {
  startFlow();
  notifyHeight();
});
</script>
